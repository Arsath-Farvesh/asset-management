<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      text-align: center;
    }
    .scanner-container {
      text-align: center;
      margin: 20px 0;
    }
    video {
      width: 100%;
      max-width: 400px;
      border: 2px solid #007bff;
      border-radius: 10px;
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background-color: #f9f9f9;
    }
    .back-btn {
      background-color: #6c757d;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.history.back()">⬅ Back</button>
  <h2>QR Code Scanner</h2>
  <div class="scanner-container">
    <video id="preview"></video>
  </div>
  <div id="result" class="result" style="display: none;">
    <h3>Asset Details</h3>
    <div id="assetDetails"></div>
  </div>

  <script>
    let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });

    scanner.addListener('scan', async function (content) {
      console.log('Scanned QR code:', content);

      // Try to fetch asset details using the QR data
      try {
        const res = await fetch(`/api/asset-by-qr?qr=${encodeURIComponent(content)}`, { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          displayAssetDetails(data.data);
        } else {
          document.getElementById('assetDetails').innerHTML = '<p>Asset not found or access denied.</p>';
          document.getElementById('result').style.display = 'block';
        }
      } catch (err) {
        console.error('Error fetching asset:', err);
        document.getElementById('assetDetails').innerHTML = '<p>Error retrieving asset details.</p>';
        document.getElementById('result').style.display = 'block';
      }

      scanner.stop(); // Stop scanning after successful scan
    });

    Instascan.Camera.getCameras().then(function (cameras) {
      if (cameras.length > 0) {
        scanner.start(cameras[0]); // Start with the first camera
      } else {
        console.error('No cameras found.');
        alert('No camera found. Please ensure camera permissions are granted.');
      }
    }).catch(function (e) {
      console.error(e);
      alert('Camera access denied. Please allow camera access.');
    });

    function displayAssetDetails(asset) {
      const details = `
        <p><strong>ID:</strong> ${asset.id}</p>
        <p><strong>Category:</strong> ${asset.category}</p>
        <p><strong>Name:</strong> ${asset.name}</p>
        <p><strong>Serial Number:</strong> ${asset.serial_number || 'N/A'}</p>
        <p><strong>Employee Name:</strong> ${asset.employee_name || 'N/A'}</p>
        <p><strong>Location:</strong> ${asset.location || 'N/A'}</p>
        <p><strong>Submitted By:</strong> ${asset.submitted_by}</p>
        <p><strong>Created At:</strong> ${new Date(asset.created_at).toLocaleString()}</p>
        <img src="${asset.qr_code}" alt="QR Code" style="max-width: 150px;">
      `;
      document.getElementById('assetDetails').innerHTML = details;
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
