<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mandatory strong password update for Takhlees Asset Management System.">
  <title>Update Password - Takhlees Asset Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/theme-professional.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .password-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }

    .password-header {
      background: linear-gradient(135deg, var(--brand-500), var(--brand-hover));
      color: #fff;
      padding: 1.5rem;
    }

    .password-body {
      padding: 1.5rem;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #6b7280;
      cursor: pointer;
    }

    #message {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="password-card">
    <div class="password-header">
      <h4 class="mb-1"><i class="bi bi-shield-lock-fill me-2"></i>Security Password Upgrade</h4>
      <p class="mb-0">Your current password is weak. Please set a strong password to continue.</p>
    </div>
    <div class="password-body">
      <form id="forcePasswordForm">
        <div class="mb-3">
          <label for="currentPassword" class="form-label">Current Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="currentPassword" required>
            <button type="button" class="password-toggle" data-target="currentPassword" aria-label="Toggle current password visibility"><i class="bi bi-eye"></i></button>
          </div>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">New Strong Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="newPassword" required>
            <button type="button" class="password-toggle" data-target="newPassword" aria-label="Toggle new password visibility"><i class="bi bi-eye"></i></button>
          </div>
          <small class="text-muted d-block mt-2">Use at least 8 characters with upper/lower case letters, number, and special character.</small>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm New Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="confirmPassword" required>
            <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="Toggle confirm password visibility"><i class="bi bi-eye"></i></button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-check2-circle me-2"></i>Update Password
        </button>
      </form>

      <div id="message"></div>
    </div>
  </div>

  <script>
    function togglePassword(fieldId, button) {
      const field = document.getElementById(fieldId);
      const icon = button.querySelector('i');
      if (!field || !icon) {
        return;
      }

      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      }
    }

    function isStrongPassword(password) {
      return Boolean(
        password
        && password.length >= 8
        && /[A-Z]/.test(password)
        && /[a-z]/.test(password)
        && /[0-9]/.test(password)
        && /[!@#$%^&*()_+\-=\[\]{};:'",.<>?/\\|`~]/.test(password)
      );
    }

    async function ensureAuthenticated() {
      const res = await fetch('/api/auth/me', { credentials: 'include', cache: 'no-store' });
      const data = await res.json();
      if (!res.ok || !data.success) {
        window.location.href = '/login.html';
      }
    }

    async function getCsrfToken() {
      const csrfRes = await fetch('/api/csrf-token', { credentials: 'include', cache: 'no-store' });
      const csrfData = await csrfRes.json();
      return csrfData.csrfToken;
    }

    document.querySelectorAll('.password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => togglePassword(btn.dataset.target, btn));
    });

    document.getElementById('forcePasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const message = document.getElementById('message');

      if (newPassword !== confirmPassword) {
        message.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
        return;
      }

      if (!isStrongPassword(newPassword)) {
        message.innerHTML = '<div class="alert alert-danger">New password is not strong enough.</div>';
        return;
      }

      try {
        const csrfToken = await getCsrfToken();
        const response = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'csrf-token': csrfToken
          },
          credentials: 'include',
          body: JSON.stringify({ currentPassword, newPassword, confirmPassword })
        });

        const payload = await response.json();
        if (!response.ok || !payload.success) {
          message.innerHTML = `<div class="alert alert-danger">${payload.error || 'Unable to update password'}</div>`;
          return;
        }

        message.innerHTML = '<div class="alert alert-success">Password updated successfully. Redirecting...</div>';
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1000);
      } catch (error) {
        message.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
      }
    });

    ensureAuthenticated();
  </script>
</body>
</html>
